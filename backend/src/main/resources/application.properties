spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/teams_tracking_system_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

media-api.base-url=${MEDIA_API_BASE_URL:https://desafio-media.onrender.com}
media-api.api-key=${MEDIA_API_KEY}

schedulers.agents.fixed-delay=60s
schedulers.locations.fixed-delay=60s
schedulers.check-ins.fixed-delay=60000
schedulers.geofences.fixed-delay=60000
