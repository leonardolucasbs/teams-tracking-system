version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: teams-tracking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root_password}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-teams_tracking_system_db}"
      MYSQL_USER: "${MYSQL_USER:-teams_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-teams_password}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teams-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teams-tracking-backend
    environment:
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/teams_tracking_system_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-teams_user}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-teams_password}"
      MEDIA_API_BASE_URL: "${MEDIA_API_BASE_URL:-https://desafio-media.onrender.com}"
      MEDIA_API_KEY: "${MEDIA_API_KEY:-}"
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - teams-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teams-tracking-frontend
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - teams-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  teams-network:
    driver: bridge
